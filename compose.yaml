services:
  fitnessdashboard:
    image: fitnessdashboard
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/fitnessdashboard.db
    volumes:
      - fitness-data:/app/data
    restart: always

volumes:
  fitness-data:

